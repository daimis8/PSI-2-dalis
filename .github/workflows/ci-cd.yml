name: CI/CD Pipeline

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore backend dependencies
        run: dotnet restore Amplio-backend/PSI.sln

      - name: Run backend tests
        run: dotnet test Amplio-backend/PSI.sln --configuration Release --no-restore

      - name: Build backend
        run: dotnet build Amplio-backend/PSI.sln --configuration Release --no-restore

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Amplio-frontend/frontend
    steps:
      - name: Get code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Amplio-frontend/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm run test --if-present

      - name: Build frontend
        run: npm run build
